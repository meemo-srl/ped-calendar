<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PED Calendar — NUWO · NOUA · A4Z</title>
<!-- Font aggiornati per un look dashboard premium -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* Base Colors */
    --bg: #F9FAFB;
    --surface: #FFFFFF;
    --surface-hover: #F3F4F6;
    --text-main: #111827;
    --text-muted: #6B7280;
    --border: #E5E7EB;
    --border-light: #F3F4F6;
    
    /* Semantic Colors */
    --green-bg: #ECFDF5; --green-text: #059669; --green-border: #10B981;
    --red-bg: #FEF2F2; --red-text: #DC2626; --red-border: #EF4444;
    --orange-bg: #FFF7ED; --orange-text: #D97706; --orange-border: #F59E0B;
    --blue-bg: #EFF6FF; --blue-text: #2563EB;
    --purple-bg: #F5F3FF; --purple-text: #7C3AED;
    --gray-bg: #F3F4F6; --gray-text: #4B5563;
    
    /* Structure */
    --radius-lg: 16px;
    --radius-md: 12px;
    --radius-sm: 8px;
    --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
    --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
    --shadow-modal: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    
    /* Dynamic Brand Color (impostato da JS) */
    --brand-color: #111827; 
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text-main);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ─── TOP BAR ─── */
  header {
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .brand-tabs {
    display: flex;
    gap: 8px;
    flex: 1;
  }

  .brand-tab {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    border: 1px solid transparent;
    border-radius: 100px;
    font-family: inherit;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    background: transparent;
    color: var(--text-muted);
  }
  
  .brand-tab .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: currentColor;
    opacity: 0.5;
    transition: all 0.2s;
  }

  .brand-tab:hover:not(.active) {
    background: var(--surface-hover);
    color: var(--text-main);
  }

  .brand-tab.active {
    background: var(--surface);
    color: var(--brand-color);
    border-color: var(--border);
    box-shadow: var(--shadow-sm);
  }
  
  .brand-tab.active .dot {
    background: var(--brand-color);
    opacity: 1;
    box-shadow: 0 0 8px color-mix(in srgb, var(--brand-color) 40%, transparent);
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  /* Toggle Vista (Mese/Settimana) */
  .view-toggle {
    display: flex;
    background: var(--surface-hover);
    border-radius: var(--radius-sm);
    padding: 4px;
    gap: 4px;
  }
  
  .view-btn {
    padding: 6px 12px;
    border: none;
    background: transparent;
    border-radius: 4px;
    font-family: inherit;
    font-weight: 600;
    font-size: 13px;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
  }
  
  .view-btn:hover { color: var(--text-main); }
  .view-btn.active {
    background: var(--surface);
    color: var(--text-main);
    box-shadow: var(--shadow-sm);
  }

  .month-nav {
    display: flex;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 4px;
    box-shadow: var(--shadow-sm);
  }
  
  .month-nav button {
    width: 32px; height: 32px;
    border: none;
    border-radius: 6px;
    background: transparent;
    cursor: pointer;
    font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    color: var(--text-muted);
  }
  
  .month-nav button:hover { 
    background: var(--surface-hover); 
    color: var(--text-main);
  }
  
  .month-label {
    font-weight: 600;
    font-size: 14px;
    min-width: 150px;
    text-align: center;
    color: var(--text-main);
  }

  /* ─── MAIN ─── */
  main { 
    padding: 32px; 
    max-width: 1600px;
    margin: 0 auto;
  }

  /* ─── STATS & FILTERS BAR ─── */
  .top-controls {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 24px;
    gap: 24px;
    flex-wrap: wrap;
  }

  .stats-bar {
    display: flex;
    gap: 16px;
    flex: 1;
    flex-wrap: wrap;
  }
  
  .stat-pill {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 12px 20px;
    display: flex; 
    flex-direction: column;
    gap: 4px;
    box-shadow: var(--shadow-sm);
    transition: transform 0.2s, box-shadow 0.2s;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    min-width: 140px;
  }
  
  .stat-pill:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
  .stat-pill .count { font-weight: 700; font-size: 20px; line-height: 1.2; color: var(--text-main); }
  .stat-pill.total { border-top: 3px solid var(--text-muted); }
  .stat-pill.ready { border-top: 3px solid var(--green-border); }
  .stat-pill.not-ready { border-top: 3px solid var(--red-border); }
  .stat-pill.scheduled { border-top: 3px solid var(--purple-text); }

  .filters-bar {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 4px;
    box-shadow: var(--shadow-sm);
    align-items: center;
  }

  .filter-btn {
    padding: 8px 16px;
    border: none;
    background: transparent;
    border-radius: 6px;
    font-family: inherit;
    font-weight: 600;
    font-size: 13px;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn:hover { color: var(--text-main); }
  .filter-btn.active {
    background: var(--surface-hover);
    color: var(--text-main);
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  }

  /* ─── CALENDAR ─── */
  .calendar-wrapper {
    width: 100%;
    overflow-x: auto;
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-md);
    background: var(--surface);
    border: 1px solid var(--border);
  }

  .calendar { min-width: 1000px; }

  .cal-header {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  
  .cal-header-cell {
    padding: 16px 8px;
    text-align: center;
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    background: var(--border-light);
    gap: 1px; 
  }

  .cal-cell {
    min-height: 160px;
    background: var(--surface);
    padding: 8px;
    position: relative;
    transition: background 0.2s, border 0.2s;
    display: flex;
    flex-direction: column;
    gap: 8px;
    cursor: pointer; 
  }
  
  /* Altezza aumentata per la vista settimanale */
  .cal-grid.week-view .cal-cell {
    min-height: 400px;
  }
  
  .cal-cell.other-month { background: #FAFAFA; }
  .cal-cell.other-month .post-card { opacity: 0.6; filter: grayscale(50%); }
  .cal-cell.today { background: color-mix(in srgb, var(--brand-color) 2%, white); }
  .cal-cell:hover { background: color-mix(in srgb, var(--brand-color) 4%, white); }
  
  /* Stili per il Drag & Drop Migliorati */
  .cal-cell.drag-over {
    background: color-mix(in srgb, var(--brand-color) 10%, white) !important;
    box-shadow: inset 0 0 0 2px var(--brand-color);
  }
  
  .day-number {
    font-weight: 600;
    font-size: 14px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2px;
  }
  
  .day-number .today-badge {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: var(--brand-color);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    box-shadow: 0 2px 6px color-mix(in srgb, var(--brand-color) 40%, transparent);
  }

  .add-btn {
    opacity: 0;
    width: 24px; height: 24px;
    border-radius: 6px;
    border: none;
    background: var(--surface);
    color: var(--text-main);
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--border);
  }
  
  .cal-cell:hover .add-btn { opacity: 1; }
  .cal-cell:hover .add-btn { background: var(--brand-color); color: white; border-color: var(--brand-color); }

  /* ─── POST CARD ─── */
  .post-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left-width: 4px; 
    border-left-color: var(--text-muted); 
    border-radius: var(--radius-sm);
    position: relative;
    cursor: grab;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 1px 2px rgba(0,0,0,0.02);
    overflow: hidden; 
    user-select: none;
    -webkit-user-select: none;
  }
  
  .post-card * {
    pointer-events: none;
  }

  .post-card:active { cursor: grabbing; }
  
  .post-card.dragging {
    opacity: 0.4;
    transform: scale(1.02);
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
  }

  .post-card:hover { 
    transform: translateY(-2px); 
    box-shadow: var(--shadow-md); 
    border-top-color: #D1D5DB; border-right-color: #D1D5DB; border-bottom-color: #D1D5DB;
  }

  .post-card.ready { border-left-color: var(--green-border); }
  .post-card.not-ready { border-left-color: var(--red-border); }
  .post-card.partial { border-left-color: var(--orange-border); }

  .post-card-inner {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 10px; 
  }
  
  .post-title {
    font-size: 12px;
    font-weight: 600;
    line-height: 1.3;
    color: var(--text-main);
    word-break: break-word; 
  }

  /* Badge styles for rows */
  .badge {
    display: inline-flex; 
    align-items: center;
    justify-content: center;
    font-size: 9px;
    font-weight: 600;
    padding: 2px 5px;
    border-radius: 4px;
    white-space: nowrap;
    line-height: 1; 
  }

  .badge.ready { background: var(--green-bg); color: var(--green-text); }
  .badge.not-ready { background: var(--red-bg); color: var(--red-text); }
  .badge.recorded { background: var(--blue-bg); color: var(--blue-text); }
  .badge.not-recorded { background: var(--orange-bg); color: var(--orange-text); }
  .badge.scheduled { background: var(--purple-bg); color: var(--purple-text); }
  .badge.not-scheduled { background: var(--gray-bg); color: var(--gray-text); }

  /* ─── MODAL ─── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(17, 24, 39, 0.4);
    backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    z-index: 1000;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s ease;
    padding: 20px;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border-radius: var(--radius-lg);
    padding: 32px;
    width: 600px;
    max-width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: var(--shadow-modal);
    transform: translateY(20px) scale(0.98);
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    border: 1px solid rgba(255,255,255,0.2);
  }
  .modal-overlay.open .modal { transform: translateY(0) scale(1); }

  .modal-header {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px;
  }
  .modal-title { font-weight: 700; font-size: 20px; color: var(--text-main); letter-spacing: -0.02em; }
  .modal-close {
    width: 32px; height: 32px; border-radius: 50%; border: none; background: var(--surface-hover);
    cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center;
    color: var(--text-muted); transition: all 0.2s;
  }
  .modal-close:hover { background: var(--border); color: var(--text-main); }

  .form-group { margin-bottom: 20px; }
  .form-label {
    font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
    color: var(--text-muted); margin-bottom: 8px; display: block;
  }
  
  .form-input, .form-textarea {
    width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: var(--radius-sm);
    font-family: inherit; font-size: 14px; color: var(--text-main); outline: none; transition: all 0.2s;
    background: var(--surface); box-shadow: 0 1px 2px rgba(0,0,0,0.02) inset;
  }
  .form-textarea {
    resize: vertical;
    min-height: 80px;
    line-height: 1.5;
  }
  .form-input:focus, .form-textarea:focus { border-color: var(--brand-color); box-shadow: 0 0 0 3px color-mix(in srgb, var(--brand-color) 15%, transparent); }

  .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .status-option {
    padding: 8px 12px; border: 1.5px solid var(--border); border-radius: var(--radius-sm);
    cursor: pointer; display: flex; align-items: center; gap: 8px;
    font-size: 12px; font-weight: 600; transition: all 0.2s; background: var(--surface); color: var(--text-muted);
  }
  .status-option:hover { border-color: var(--text-muted); color: var(--text-main); }
  .status-option.selected { 
    border-color: var(--brand-color); background: color-mix(in srgb, var(--brand-color) 4%, white); color: var(--brand-color);
  }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  .modal-actions {
    display: flex; gap: 12px; margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--border);
  }
  .btn {
    flex: 1; padding: 12px 24px; border-radius: var(--radius-sm); font-family: inherit;
    font-weight: 600; font-size: 14px; cursor: pointer; transition: all 0.2s; border: none;
    display: flex; align-items: center; justify-content: center;
  }
  .btn-primary { background: var(--brand-color); color: #fff; box-shadow: 0 2px 4px color-mix(in srgb, var(--brand-color) 30%, transparent); }
  .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 4px 6px color-mix(in srgb, var(--brand-color) 40%, transparent); }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-main); }
  .btn-ghost:hover { background: var(--surface-hover); }
  .btn-danger { background: var(--red-bg); color: var(--red-text); flex: 0.5; padding: 12px;}
  .btn-danger:hover { background: #FEE2E2; }
  .btn-duplicate { background: var(--blue-bg); color: var(--blue-text); flex: 0.5; padding: 12px;}
  .btn-duplicate:hover { filter: brightness(0.95); }

  /* Lightbox styles */
  .lightbox-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    z-index: 2000; display: flex; justify-content: center; align-items: center;
    opacity: 0; pointer-events: none; transition: opacity 0.2s ease;
  }
  .lightbox-overlay.open { opacity: 1; pointer-events: all; }
  .lightbox-img { max-width: 90vw; max-height: 90vh; border-radius: 8px; object-fit: contain; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
  .lightbox-close {
    position: absolute; top: 24px; right: 24px; color: #fff; font-size: 32px;
    cursor: pointer; background: rgba(255,255,255,0.1); border: none; width: 48px; height: 48px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; transition: background 0.2s;
  }
  .lightbox-close:hover { background: rgba(255,255,255,0.2); }
  .img-upload-area:hover .zoom-hint { opacity: 1 !important; }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #9CA3AF; }

  @media (max-width: 768px) {
    header { padding: 0 16px; flex-direction: column; height: auto; padding-top: 12px; padding-bottom: 12px; gap: 12px;}
    main { padding: 16px; }
    .brand-tabs { width: 100%; overflow-x: auto; padding-bottom: 4px; }
    .media-item-layout { flex-direction: column; }
    .top-controls { flex-direction: column; align-items: stretch; gap: 16px; }
    .modal-actions { flex-wrap: wrap; }
    .modal-actions .btn { min-width: 45%; }
  }
</style>
</head>
<body>

<div id="app" data-brand="nuwo">

<header>
  <div class="brand-tabs">
    <button class="brand-tab active" data-brand="nuwo" style="--brand-color:#C8102E" onclick="switchBrand('nuwo')">
      <span class="dot"></span> NUWO
    </button>
    <button class="brand-tab" data-brand="noua" style="--brand-color:#E87722" onclick="switchBrand('noua')">
      <span class="dot"></span> NOUA
    </button>
    <button class="brand-tab" data-brand="a4z" style="--brand-color:#2196F3" onclick="switchBrand('a4z')">
      <span class="dot"></span> A4Z
    </button>
  </div>
  <div class="header-right">
    <div class="view-toggle">
      <button class="view-btn active" id="view-month" onclick="setView('month')">Mese</button>
      <button class="view-btn" id="view-week" onclick="setView('week')">Settimana</button>
    </div>
    <div class="month-nav">
      <button onclick="prevPeriod()">‹</button>
      <span class="month-label" id="period-label"></span>
      <button onclick="nextPeriod()">›</button>
    </div>
  </div>
</header>

<main>
  <div class="top-controls">
    <div class="stats-bar" id="stats-bar"></div>
    <div class="filters-bar">
      <button class="filter-btn active" id="filter-all" onclick="setFilter('all')">Tutti</button>
      <button class="filter-btn" id="filter-todo" onclick="setFilter('todo')">Da completare</button>
      <button class="filter-btn" id="filter-ready" onclick="setFilter('ready')">Pronti</button>
    </div>
  </div>
  
  <div class="calendar-wrapper">
    <div class="calendar" id="calendar"></div>
  </div>
</main>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Nuovo Post</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>

    <!-- TITOLI SEPARATI PER TIPO -->
    <div style="display:flex; flex-direction:column; gap:12px; margin-bottom:20px;">
      <div class="form-group" style="margin-bottom:0;">
        <label class="form-label" style="display:flex; align-items:center; gap:6px;">
          <span style="background:#16A34A; color:white; font-size:9px; font-weight:700; padding:2px 6px; border-radius:4px;">POST</span>
          Titolo Post
        </label>
        <input class="form-input" id="title-post" placeholder="Es. Lancio VITRA BK100" />
      </div>
      <div class="form-group" style="margin-bottom:0;">
        <label class="form-label" style="display:flex; align-items:center; gap:6px;">
          <span style="background:#7C3AED; color:white; font-size:9px; font-weight:700; padding:2px 6px; border-radius:4px;">STORIES</span>
          Titolo Stories
        </label>
        <input class="form-input" id="title-stories" placeholder="Es. Stories lancio prodotto" />
      </div>
      <div class="form-group" style="margin-bottom:0;">
        <label class="form-label" style="display:flex; align-items:center; gap:6px;">
          <span style="background:#0369A1; color:white; font-size:9px; font-weight:700; padding:2px 6px; border-radius:4px;">VIDEO</span>
          Titolo Video
        </label>
        <input class="form-input" id="title-video" placeholder="Es. Reel unboxing VITRA" />
      </div>
    </div>

    <!-- COPY SEPARATI PER POST E VIDEO -->
    <div style="display:flex; flex-direction:column; gap:12px; margin-bottom:20px;">
      <div class="form-group" style="margin-bottom:0;">
        <label class="form-label" style="display:flex; align-items:center; gap:6px;">
          <span style="background:#16A34A; color:white; font-size:9px; font-weight:700; padding:2px 6px; border-radius:4px;">POST</span>

<script>
// ─── SUPABASE CONFIG ─────────────────────────────────────
const SUPABASE_URL = 'https://oallxkmicwonwmkemxzj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9hbGx4a21pY3dvbndta2VteHpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4OTMyMDEsImV4cCI6MjA4ODQ2OTIwMX0.ObnBsqRIGQSNxwEaWMVTLD8tnOTSh2o0YdaDwLWjuTo';

async function sbFetch(path, options = {}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': options.prefer || 'return=representation',
      ...options.headers
    },
    ...options
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(err);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

// ─── STATE ───────────────────────────────────────────────
let state = {
  brand: 'nuwo',
  refDate: new Date(), 
  viewMode: 'month', 
  posts: {},
  filter: 'all',
  currentViewStartDate: new Date(),
  currentViewEndDate: new Date()
};

// Variabile per evitare di ricaricare dati già caricati
let currentLoadedMonth = null;

// Struttura dati per copy, singole foto e relativi stati
let currentData = {};

function initDefaultData() {
  return {
    copyPost:  '',
    copyVideo: '',
    post:    { img: null, status: 'not-ready', scheduled: 'not-scheduled', title: '' },
    stories: { img: null, status: 'not-ready', scheduled: 'not-scheduled', title: '' },
    video:   { img: null, status: 'not-ready', scheduled: 'not-scheduled', title: '' }
  };
}

// ─── LOAD FROM SUPABASE OTTIMIZZATO (Scaricamento a Blocchi) ───
async function fetchPostsIfNeeded() {
  const m = state.refDate.getMonth();
  const y = state.refDate.getFullYear();
  const monthKey = `${y}-${m}`;
  
  // Se abbiamo già scaricato questo mese, non facciamo un'altra chiamata a Supabase
  if (currentLoadedMonth !== monthKey) {
      currentLoadedMonth = monthKey;
      showLoader(true);
      
      // Calcoliamo un range generoso: mese precedente, mese corrente, mese successivo
      const start = new Date(y, m - 1, 1);
      const end = new Date(y, m + 2, 0); // Ultimo giorno del mese successivo
      const startStr = dateKey(start);
      const endStr = dateKey(end);

      try {
          // Scarica solo i post all'interno del periodo specificato (Ottimizzazione Query)
          const rows = await sbFetch(`posts?select=*&date=gte.${startStr}&date=lte.${endStr}&order=position.asc,created_at.asc`);
          
          // Svuota la memoria per mantenere l'app sempre veloce
          state.posts = {};
          
          rows.forEach(row => {
              const key = `${row.brand}|${row.date}`;
              if (!state.posts[key]) state.posts[key] = [];
              state.posts[key].push({
                  id: row.id,
                  title: row.title,
                  image: row.image, 
                  status: row.status, 
                  videoStatus: row.video_status, 
                  scheduledStatus: row.scheduled_status 
              });
          });
      } catch(e) {
          console.error('Errore caricamento:', e);
          showToast('Errore connessione database', 'error');
      }
      showLoader(false);
  }
  
  // Renderizza il calendario dopo aver assicurato i dati
  renderCalendar();
}

// ─── SAVE TO SUPABASE ────────────────────────────────────
async function savePostToDb(post, brand, date, position) {
  const payload = {
    brand,
    date,
    title: post.title,
    image: post.image || null,
    status: post.status, 
    video_status: post.videoStatus || null,
    scheduled_status: post.scheduledStatus || null,
    position
  };
  if (post.id) {
    await sbFetch(`posts?id=eq.${post.id}`, {
      method: 'PATCH',
      prefer: 'return=representation',
      body: JSON.stringify(payload)
    });
  } else {
    const result = await sbFetch('posts', {
      method: 'POST',
      prefer: 'return=representation',
      body: JSON.stringify(payload)
    });
    if (result && result[0]) post.id = result[0].id;
  }
  return post;
}

async function deletePostFromDb(id) {
  await sbFetch(`posts?id=eq.${id}`, { method: 'DELETE', prefer: 'return=minimal' });
}

// ─── UI HELPERS ──────────────────────────────────────────
function showLoader(visible) {
  let el = document.getElementById('loader');
  if (!el) {
    el = document.createElement('div');
    el.id = 'loader';
    el.style.cssText = 'position:fixed;top:0;left:0;right:0;height:3px;background:var(--brand-color);z-index:9999;transition:opacity 0.3s;';
    document.body.appendChild(el);
  }
  el.style.opacity = visible ? '1' : '0';
}

function showToast(msg, type = 'success') {
  const t = document.createElement('div');
  t.style.cssText = `position:fixed;bottom:24px;right:24px;padding:12px 24px;border-radius:8px;font-size:14px;font-weight:600;z-index:9999;box-shadow:var(--shadow-lg);background:${type==='error'?'var(--red-bg)':'var(--text-main)'};color:${type==='error'?'var(--red-text)':'#fff'};transition:all 0.3s cubic-bezier(0.4, 0, 0.2, 1); transform: translateY(20px); opacity: 0;`;
  t.textContent = msg;
  document.body.appendChild(t);
  requestAnimationFrame(() => { t.style.transform = 'translateY(0)'; t.style.opacity = '1'; });
  setTimeout(() => { t.style.transform = 'translateY(20px)'; t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 3000);
}

const MONTHS_IT = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
const DAYS_IT   = ['Lun','Mar','Mer','Gio','Ven','Sab','Dom'];

// ─── BRAND & NAV & FILTERS ───────────────────────────────
function switchBrand(brand) {
  state.brand = brand;
  document.getElementById('app').dataset.brand = brand;
  document.querySelectorAll('.brand-tab').forEach(t => t.classList.toggle('active', t.dataset.brand === brand));
  renderCalendar();
}

function setView(mode) {
  state.viewMode = mode;
  document.querySelectorAll('.view-btn').forEach(btn => btn.classList.remove('active'));
  document.getElementById(`view-${mode}`).classList.add('active');
  renderCalendar();
}

function prevPeriod() { 
  if (state.viewMode === 'month') {
    state.refDate.setMonth(state.refDate.getMonth() - 1); 
  } else {
    state.refDate.setDate(state.refDate.getDate() - 7);
  }
  fetchPostsIfNeeded(); 
}

function nextPeriod() { 
  if (state.viewMode === 'month') {
    state.refDate.setMonth(state.refDate.getMonth() + 1); 
  } else {
    state.refDate.setDate(state.refDate.getDate() + 7);
  }
  fetchPostsIfNeeded(); 
}

function setFilter(filterType) {
  state.filter = filterType;
  document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
  document.getElementById(`filter-${filterType}`).classList.add('active');
  renderCalendar();
}

// ─── PARSE LEGACY JSON ────────────────────────────────────
function parsePostData(p) {
  let data = initDefaultData();
  if (!p || !p.image) return data;
  
  if (p.image.startsWith('{')) {
    try {
      const parsed = JSON.parse(p.image);
      if (typeof parsed.post === 'string' || typeof parsed.stories === 'string') {
        if(parsed.post) data.post.img = parsed.post;
        if(parsed.stories) data.stories.img = parsed.stories;
        if(parsed.video) data.video.img = parsed.video;
        data.post.status = p.status || 'not-ready';
        data.post.scheduled = p.scheduledStatus || 'not-scheduled';
      } else {
        data = { ...data, ...parsed };
      }
      if (data.video.status === 'not-recorded') data.video.status = 'not-ready';
      if (data.video.status === 'recorded') data.video.status = 'ready';
    } catch(e) {}
  } else {
    data.post.img = p.image;
    data.post.status = p.status || 'not-ready';
    data.post.scheduled = p.scheduledStatus || 'not-scheduled';
  }
  return data;
}

// ─── DRAG & DROP LOGIC ────────────────────────────────────
let dragData = null;

function handleDragStart(e, dateStr, index) {
  dragData = { dateStr, index };
  e.dataTransfer.effectAllowed = 'move';
  
  try {
    e.dataTransfer.setData('application/json', JSON.stringify(dragData));
  } catch(err) {
    e.dataTransfer.setData('text/plain', 'fallback');
  }

  setTimeout(() => {
    if (e.target && e.target.classList) e.target.classList.add('dragging');
  }, 0);
}

function handleDragEnd(e) {
  if (e.target && e.target.classList) e.target.classList.remove('dragging');
  document.querySelectorAll('.cal-cell').forEach(c => c.classList.remove('drag-over'));
  dragData = null;
}

function handleDragOver(e) {
  e.preventDefault(); 
  e.dataTransfer.dropEffect = 'move';
  const cell = e.target.closest('.cal-cell');
  if (cell) cell.classList.add('drag-over');
}

function handleDragLeave(e) {
  const cell = e.target.closest('.cal-cell');
  if (cell) cell.classList.remove('drag-over');
}

async function handleDrop(e, targetDateStr) {
  e.preventDefault();
  e.stopPropagation();

  const cell = e.target.closest('.cal-cell');
  if (cell) cell.classList.remove('drag-over');

  let data = dragData;
  if (!data) {
    try {
      const dt = e.dataTransfer.getData('application/json');
      if (dt) data = JSON.parse(dt);
    } catch(err) {}
  }

  if (!data) return;

  try {
    const { dateStr: sourceDateStr, index } = data;
    
    if (sourceDateStr === targetDateStr) return; 

    const sourceKey = `${state.brand}|${sourceDateStr}`;
    const targetKey = `${state.brand}|${targetDateStr}`;

    if (!state.posts[sourceKey] || !state.posts[sourceKey][index]) return;

    const postToMove = state.posts[sourceKey][index];
    state.posts[sourceKey].splice(index, 1);
    if (state.posts[sourceKey].length === 0) delete state.posts[sourceKey];

    if (!state.posts[targetKey]) state.posts[targetKey] = [];
    const targetPosition = state.posts[targetKey].length;
    state.posts[targetKey].push(postToMove);

    renderCalendar();

    if (postToMove.id) {
      await sbFetch(`posts?id=eq.${postToMove.id}`, {
        method: 'PATCH',
        prefer: 'return=minimal',
        body: JSON.stringify({ date: targetDateStr, position: targetPosition })
      });
    }
  } catch(err) {
    console.error('Errore D&D:', err);
    showToast('Errore nello spostamento', 'error');
  } finally {
    dragData = null;
  }
}

// ─── RENDER CALENDAR ──────────────────────────────────────
function renderCalendar() {
  const { brand, refDate, viewMode } = state;
  const year = refDate.getFullYear();
  const month = refDate.getMonth();
  const colors = { nuwo: '#C8102E', noua: '#E87722', a4z: '#2196F3' };
  document.documentElement.style.setProperty('--brand-color', colors[brand]);

  let html = '<div class="cal-header">';
  DAYS_IT.forEach(d => html += `<div class="cal-header-cell">${d}</div>`);
  html += '</div>';

  let gridHtml = '';
  let startDate, endDate;
  const today = new Date();

  if (viewMode === 'month') {
    document.getElementById('period-label').textContent = `${MONTHS_IT[month]} ${year}`;
    
    const firstDay = new Date(year, month, 1);
    const lastDay  = new Date(year, month + 1, 0);
    let startDow = (firstDay.getDay() + 6) % 7; 
    
    const prevLast = new Date(year, month, 0).getDate();
    startDate = new Date(year, month - 1, prevLast - startDow + 1);
    
    for (let i = startDow - 1; i >= 0; i--) {
        gridHtml += renderCell(new Date(year, month - 1, prevLast - i), true, today);
    }
    for (let d = 1; d <= lastDay.getDate(); d++) {
        gridHtml += renderCell(new Date(year, month, d), false, today);
    }
    
    const remaining = (7 - ((startDow + lastDay.getDate()) % 7)) % 7;
    for (let d = 1; d <= remaining; d++) {
        gridHtml += renderCell(new Date(year, month + 1, d), true, today);
    }
    endDate = new Date(year, month + 1, remaining);
    
    html += `<div class="cal-grid month-view">${gridHtml}</div>`;
  } else {
    // VISTA SETTIMANALE
    let d = new Date(refDate);
    let day = d.getDay();
    let diff = d.getDate() - day + (day === 0 ? -6 : 1); // Calcola il lunedì della settimana
    let startOfWeek = new Date(d.setDate(diff));
    startDate = new Date(startOfWeek);
    
    let endOfWeek = new Date(startOfWeek);
    endOfWeek.setDate(startOfWeek.getDate() + 6);
    endDate = new Date(endOfWeek);
    
    let startStr = `${startOfWeek.getDate()} ${MONTHS_IT[startOfWeek.getMonth()].substring(0,3)}`;
    let endStr = `${endOfWeek.getDate()} ${MONTHS_IT[endOfWeek.getMonth()].substring(0,3)} ${endOfWeek.getFullYear()}`;
    document.getElementById('period-label').textContent = `${startStr} - ${endStr}`;
    
    for (let i = 0; i < 7; i++) {
        let cellDate = new Date(startOfWeek);
        cellDate.setDate(startOfWeek.getDate() + i);
        // Nella vista settimana, i giorni di altri mesi non li sbiadiamo
        gridHtml += renderCell(cellDate, false, today);
    }
    html += `<div class="cal-grid week-view">${gridHtml}</div>`;
  }

  document.getElementById('calendar').innerHTML = html;
  
  // Salviamo le date visibili nello stato per permettere all'export di trovare il periodo corretto
  state.currentViewStartDate = startDate;
  state.currentViewEndDate = endDate;
  
  renderStats(startDate, endDate);
}

function renderCell(date, otherMonth, today) {
  const key = `${state.brand}|${dateKey(date)}`;
  let posts = state.posts[key] || [];
  
  // Applica Filtri
  if (state.filter !== 'all') {
    posts = posts.filter(p => {
       const isReady = p.status === 'ready';
       return state.filter === 'ready' ? isReady : !isReady;
    });
  }

  const isToday = dateKey(date) === dateKey(today);
  const dStr = dateKey(date);

  let cls = `cal-cell ${otherMonth ? 'other-month' : ''} ${isToday ? 'today' : ''}`;
  let dayNum = `<div class="day-number"><span ${isToday ? 'class="today-badge"' : ''}>${date.getDate()}</span><div class="add-btn">+</div></div>`;

  let postsHtml = '';
  posts.forEach((p, i) => {
    let parsedData = parsePostData(p);
    
    let activeTypes = [];
    ['post', 'stories', 'video'].forEach(type => {
      let d = parsedData[type];
      if (d.img || d.status !== 'not-ready' || d.scheduled !== 'not-scheduled') {
        activeTypes.push({type, data: d});
      }
    });

    if(activeTypes.length === 0) activeTypes.push({type: 'post', data: parsedData.post});

    let rowsHtml = '';
    activeTypes.forEach(item => {
      let label = item.type === 'post' ? 'POST' : (item.type === 'stories' ? 'STORIES' : 'VIDEO');
      let color = item.type === 'post' ? '#16A34A' : (item.type === 'stories' ? '#7C3AED' : '#0369A1');
      let typeTitle = item.data.title || '';
      
      let b1 = item.data.status === 'ready' ? '<span class="badge ready">Pronto</span>' : '<span class="badge not-ready">Non Pronto</span>';
      let b2 = item.data.scheduled === 'scheduled' ? '<span class="badge scheduled">Prog.</span>' : '<span class="badge not-scheduled">No Prog.</span>';

      rowsHtml += `
        <div style="display:flex; flex-direction:column; gap:4px; margin-top:6px; padding:6px 8px; border-radius:6px; background:var(--surface-hover); border-left:3px solid ${color};">
          <div style="display:flex; align-items:center; gap:6px;">
            <span style="background:${color}; color:white; font-size:9px; font-weight:700; padding:1px 5px; border-radius:3px; flex-shrink:0;">${label}</span>
            ${typeTitle ? `<span style="font-size:11px; font-weight:600; color:var(--text-main); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${escHtml(typeTitle)}</span>` : ''}
          </div>
          <div style="display:flex; gap:4px;">${b1}${b2}</div>
        </div>
      `;
    });

    let cardStatusColor = 'var(--text-muted)';
    if(activeTypes[0].data.status === 'ready') cardStatusColor = 'var(--green-border)';
    else if(activeTypes[0].data.status === 'not-ready') cardStatusColor = 'var(--red-border)';

    postsHtml += `<div class="post-card" draggable="true" ondragstart="handleDragStart(event, '${dStr}', ${i})" ondragend="handleDragEnd(event)" style="border-left-color: ${cardStatusColor}" onclick="event.stopPropagation(); editPost('${dStr}', ${i})">
      <div class="post-card-inner">
        <div style="display:flex; flex-direction:column;">${rowsHtml}</div>
      </div>
    </div>`;
  });

  return `<div class="${cls}" onclick="openModal('${dStr}')" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event, '${dStr}')">${dayNum}${postsHtml}</div>`;
}

function renderStats(startDate, endDate) {
  const { brand } = state;
  
  let stats = {
    post: { total: 0, ready: 0 },
    stories: { total: 0, ready: 0 },
    video: { total: 0, ready: 0 },
    scheduled: 0
  };

  const sTime = new Date(startDate.getFullYear(), startDate.getMonth(), startDate.getDate()).getTime();
  const eTime = new Date(endDate.getFullYear(), endDate.getMonth(), endDate.getDate()).getTime();

  Object.entries(state.posts).forEach(([key, posts]) => {
    if (!key.startsWith(brand + '|')) return;
    
    const d = new Date(key.split('|')[1]);
    const dTime = new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
    
    if (dTime >= sTime && dTime <= eTime) {
      posts.forEach(p => {
        let parsed = parsePostData(p);
        ['post', 'stories', 'video'].forEach(type => {
           let data = parsed[type];
           if (data.img || data.status !== 'not-ready' || data.scheduled !== 'not-scheduled') {
               stats[type].total++;
               if (data.status === 'ready') stats[type].ready++;
               if (data.scheduled === 'scheduled') stats.scheduled++;
           }
        });
      });
    }
  });

  let html = `
    <div class="stat-pill" style="border-top: 3px solid var(--brand-color)">
      <div style="font-size: 11px; text-transform: uppercase; font-weight: 700; color: var(--text-muted);">Post</div>
      <div style="display: flex; align-items: baseline; gap: 6px;">
        <span class="count">${stats.post.total}</span>
        <span style="font-size: 12px; color: ${stats.post.ready > 0 ? 'var(--green-text)' : 'var(--text-muted)'}; font-weight: 600;">${stats.post.ready} Pronti</span>
      </div>
    </div>
    <div class="stat-pill" style="border-top: 3px solid var(--brand-color)">
      <div style="font-size: 11px; text-transform: uppercase; font-weight: 700; color: var(--text-muted);">Stories</div>
      <div style="display: flex; align-items: baseline; gap: 6px;">
        <span class="count">${stats.stories.total}</span>
        <span style="font-size: 12px; color: ${stats.stories.ready > 0 ? 'var(--green-text)' : 'var(--text-muted)'}; font-weight: 600;">${stats.stories.ready} Pronti</span>
      </div>
    </div>
    <div class="stat-pill" style="border-top: 3px solid var(--brand-color)">
      <div style="font-size: 11px; text-transform: uppercase; font-weight: 700; color: var(--text-muted);">Video</div>
      <div style="display: flex; align-items: baseline; gap: 6px;">
        <span class="count">${stats.video.total}</span>
        <span style="font-size: 12px; color: ${stats.video.ready > 0 ? 'var(--green-text)' : 'var(--text-muted)'}; font-weight: 600;">${stats.video.ready} Pronti</span>
      </div>
    </div>
    <div class="stat-pill" style="border-top: 3px solid var(--brand-color)">
      <div style="font-size: 11px; text-transform: uppercase; font-weight: 700; color: var(--text-muted);">Programmati</div>
      <div style="display: flex; align-items: baseline; gap: 6px;">
        <span class="count">${stats.scheduled}</span>
        <span style="font-size: 12px; color: var(--text-muted); font-weight: 600;">Elementi</span>
      </div>
    </div>
  `;

  document.getElementById('stats-bar').innerHTML = html;
}

// ─── UPLOAD MULTIPLO & DINAMICO UI ─────────────────────────────
function renderUploadAreas() {
  const container = document.getElementById('media-uploads-container');
  let types = ['post', 'stories', 'video'];

  let html = `<div style="display: flex; flex-direction: column; gap: 16px;">`;

  types.forEach(type => {
    const label = type.charAt(0).toUpperCase() + type.slice(1);
    const data = currentData[type];
    
    let statusOptions = `
        <div class="status-option ${data.status === 'not-ready' ? 'selected' : ''}" onclick="updateDataStatus('${type}', 'status', 'not-ready')">
          <span class="status-dot" style="background:var(--red-border)"></span> Non Pronto
        </div>
        <div class="status-option ${data.status === 'ready' ? 'selected' : ''}" onclick="updateDataStatus('${type}', 'status', 'ready')">
          <span class="status-dot" style="background:var(--green-border)"></span> Pronto
        </div>
      `;

    let scheduledOptions = `
        <div class="status-option ${data.scheduled === 'not-scheduled' ? 'selected' : ''}" onclick="updateDataStatus('${type}', 'scheduled', 'not-scheduled')">
          <span class="status-dot" style="background:var(--text-muted)"></span> No Prog.
        </div>
        <div class="status-option ${data.scheduled === 'scheduled' ? 'selected' : ''}" onclick="updateDataStatus('${type}', 'scheduled', 'scheduled')">
          <span class="status-dot" style="background:var(--purple-text)"></span> Prog.
        </div>
    `;

    html += `
      <div style="border: 1px solid var(--border); border-radius: var(--radius-md); padding: 16px; background: var(--surface-hover);">
        
        <div style="font-weight: 700; font-size: 14px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;">
           <span style="display:flex; align-items:center; gap:8px;">
             <span style="background:${type === 'post' ? '#16A34A' : type === 'stories' ? '#7C3AED' : '#0369A1'}; color:white; font-size:10px; font-weight:700; padding:2px 8px; border-radius:4px;">${label.toUpperCase()}</span>
           </span>
           <div style="display: flex; gap: 8px;">
               ${data.img ? `<button type="button" onclick="document.getElementById('img-input-${type}').click()" style="background:var(--surface); border:1px solid var(--border); color:var(--text-main); cursor:pointer; font-size:11px; font-weight:600; padding:4px 8px; border-radius:4px; transition:all 0.2s;">🔄 Cambia Foto</button>` : ''}
               ${data.img ? `<button type="button" onclick="removeImage('${type}')" style="background:var(--red-bg); border:1px solid var(--red-border); color:var(--red-text); cursor:pointer; font-size:11px; font-weight:600; padding:4px 8px; border-radius:4px; transition:all 0.2s;">🗑 Rimuovi</button>` : ''}
           </div>
        </div>
        
        <div class="media-item-layout" style="display: flex; gap: 16px; align-items: stretch;">
            <!-- Box Immagine -->
            <div class="img-upload-area" style="width: 100px; height: 140px; padding: 4px; display: flex; flex-direction: column; justify-content: center; align-items: center; flex-shrink: 0; background: var(--surface); box-shadow: var(--shadow-sm); cursor: pointer; position: relative;" onclick="${data.img ? `openLightbox(document.getElementById('img-preview-${type}').src)` : `document.getElementById('img-input-${type}').click()`}">
              <input type="file" accept="image/*" id="img-input-${type}" onchange="handleSpecificImageUpload(event, '${type}')" style="display:none;" />
              <div class="img-upload-text" style="display: ${data.img ? 'none' : 'block'}; font-size: 12px; text-align: center; color: var(--text-muted);">📷<br/>Carica</div>
              <img id="img-preview-${type}" src="${data.img || ''}" style="display: ${data.img ? 'block' : 'none'}; width: 100%; height: 100%; object-fit: cover; border-radius: 4px;" />
              ${data.img ? `<div class="zoom-hint" style="position:absolute; inset:0; background:rgba(0,0,0,0.5); color:white; display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity 0.2s; border-radius:4px; font-size:24px; pointer-events:none;">🔍</div>` : ''}
            </div>
            
            <!-- Controlli -->
            <div style="flex: 1; display: flex; flex-direction: column; gap: 12px; justify-content: center;">
                <div>
                   <div style="font-size:11px; color:var(--text-muted); text-transform:uppercase; font-weight:600; margin-bottom:4px;">Stato ${label}</div>
                   <div class="status-grid">${statusOptions}</div>
                </div>
                <div>
                   <div style="font-size:11px; color:var(--text-muted); text-transform:uppercase; font-weight:600; margin-bottom:4px;">Programmazione</div>
                   <div class="status-grid">${scheduledOptions}</div>
                </div>
            </div>
        </div>
      </div>
    `;
  });

  html += `</div>`;
  container.innerHTML = html;
}

function updateDataStatus(type, key, value) {
  currentData[type][key] = value;
  renderUploadAreas(); 
}

function removeImage(type) {
  currentData[type].img = null;
  renderUploadAreas();
}

function handleSpecificImageUpload(e, type) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const MAX_WIDTH = 800; const MAX_HEIGHT = 800;
      let width = img.width; let height = img.height;
      if (width > height && width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } 
      else if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
      canvas.width = width; canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);
      currentData[type].img = canvas.toDataURL('image/jpeg', 0.8);
      renderUploadAreas();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

// ─── MODAL LOGIC E AZIONI ─────────────────────────────────────
function openModal(dateStr, editIndex = null) {
  modalDate = dateStr;
  modalEditIndex = editIndex;

  const isEdit = editIndex !== null;
  const key = `${state.brand}|${dateStr}`;
  const post = isEdit ? state.posts[key][editIndex] : null;

  const [y, m, d] = dateStr.split('-');
  document.getElementById('modal-title').textContent = isEdit ? `Modifica Contenuti — ${parseInt(d)} ${MONTHS_IT[parseInt(m)-1]}` : `Nuovi Contenuti — ${parseInt(d)} ${MONTHS_IT[parseInt(m)-1]}`;
  
  // Popola la struttura dati interna
  currentData = parsePostData(post);
  
  // Popola i 3 titoli separati
  document.getElementById('title-post').value    = currentData.post.title    || post?.title || '';
  document.getElementById('title-stories').value = currentData.stories.title || '';
  document.getElementById('title-video').value   = currentData.video.title   || '';
  
  // Popola il campo copy
  document.getElementById('copy-post').value  = currentData.copyPost  || currentData.copy || '';
  document.getElementById('copy-video').value = currentData.copyVideo || '';

  renderUploadAreas();

  document.getElementById('delete-btn').style.display = isEdit ? 'flex' : 'none';
  document.getElementById('duplicate-btn').style.display = isEdit ? 'flex' : 'none';
  
  document.getElementById('modal-overlay').classList.add('open');
}

function editPost(dateStr, index) { openModal(dateStr, index); }
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
function handleOverlayClick(e) { if (e.target === document.getElementById('modal-overlay')) closeModal(); }

async function savePost() {
  const titlePost    = document.getElementById('title-post').value.trim();
  const titleStories = document.getElementById('title-stories').value.trim();
  const titleVideo   = document.getElementById('title-video').value.trim();
  
  if (!titlePost && !titleStories && !titleVideo) { 
    document.getElementById('title-post').focus(); 
    showToast('Inserisci almeno un titolo', 'error');
    return; 
  }

  const key = `${state.brand}|${modalDate}`;
  if (!state.posts[key]) state.posts[key] = [];

  let post = modalEditIndex !== null ? { ...state.posts[key][modalEditIndex] } : {};

  // Salva i titoli dentro currentData
  currentData.post.title    = titlePost;
  currentData.stories.title = titleStories;
  currentData.video.title   = titleVideo;
  
  // Il titolo principale della card è quello del post (o il primo disponibile)
  post.title = titlePost || titleStories || titleVideo;
  
  // Salva i 2 copy separati
  currentData.copyPost  = document.getElementById('copy-post').value.trim();
  currentData.copyVideo = document.getElementById('copy-video').value.trim();
  post.image = JSON.stringify(currentData);
  
  if (currentData.post.status === 'ready' || currentData.stories.status === 'ready' || currentData.video.status === 'ready') {
      post.status = 'ready';
  } else {
      post.status = 'not-ready';
  }

  const position = modalEditIndex !== null ? modalEditIndex : state.posts[key].length;
  const saveBtn = document.querySelector('.btn-primary');
  saveBtn.textContent = 'Salvataggio in corso...';
  saveBtn.disabled = true;

  try {
    const saved = await savePostToDb(post, state.brand, modalDate, position);
    if (modalEditIndex !== null) state.posts[key][modalEditIndex] = saved;
    else state.posts[key].push(saved);
    showToast('Salvataggio completato ✓');
    closeModal();
    renderCalendar();
  } catch(e) {
    showToast('Errore durante il salvataggio', 'error');
  } finally {
    saveBtn.textContent = 'Salva';
    saveBtn.disabled = false;
  }
}

async function duplicatePost() {
  if (modalEditIndex === null) return; 
  
  const key = `${state.brand}|${modalDate}`;
  let originalPost = state.posts[key][modalEditIndex];
  
  let newPost = { ...originalPost };
  delete newPost.id; // Togliamo l'ID così Supabase ne crea uno nuovo
  newPost.title = newPost.title + ' (Copia)';
  
  const position = state.posts[key].length;
  const duplicateBtn = document.getElementById('duplicate-btn');
  duplicateBtn.textContent = 'Duplicazione...';
  duplicateBtn.disabled = true;
  
  try {
    const saved = await savePostToDb(newPost, state.brand, modalDate, position);
    state.posts[key].push(saved);
    showToast('Post duplicato correttamente ✓');
    closeModal();
    renderCalendar();
  } catch(e) {
    showToast('Errore durante la duplicazione', 'error');
  } finally {
    duplicateBtn.textContent = 'Duplica';
    duplicateBtn.disabled = false;
  }
}

async function deletePost() {
  const key = `${state.brand}|${modalDate}`;
  const post = state.posts[key][modalEditIndex];
  try {
    if (post.id) await deletePostFromDb(post.id);
    state.posts[key].splice(modalEditIndex, 1);
    if (state.posts[key].length === 0) delete state.posts[key];
    showToast('Blocco eliminato');
    closeModal();
    renderCalendar();
  } catch(e) { showToast('Errore eliminazione', 'error'); }
}

function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function escHtml(str) { return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ─── LIGHTBOX LOGIC ───────────────────────────────────────
function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox-overlay').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox-overlay').classList.remove('open');
  setTimeout(() => {
    document.getElementById('lightbox-img').src = '';
  }, 200);
}

// ─── INIT ─────────────────────────────────────────────────
// Sostituito il vecchio caricamento con quello ottimizzato a blocchi
fetchPostsIfNeeded();
</script>
